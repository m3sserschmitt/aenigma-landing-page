
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - Aenigma</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: #212121;
        color: #e0e0e0;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }
      .container {
        max-width: 500px;
        padding: 2rem;
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        color: #757575;
      }
      p {
        font-size: 1.2rem;
        margin-bottom: 2rem;
      }
      a {
        color: #757575;
        text-decoration: none;
        border: 2px solid #757575;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        transition: all 0.3s ease;
      }
      a:hover {
        background: #757575;
        color: #212121;
      }
    </style>
    <script>
      // Redirect to home page for GitHub Pages SPA routing
      window.location.replace(window.location.origin + window.location.pathname.split('/')[1] + '/');
    </script>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>Page not found</p>
      <a href="/">Go Home</a>
    </div>
  </body>
</html>
